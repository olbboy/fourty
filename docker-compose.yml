# Fourty — one-command self-host (ADR-006).
#   docker compose up --build
# Brings up Postgres, runs migrations once (as the owner role), then starts the
# app (as the non-owner, RLS-subject role fourty_app) and a background worker
# (pg-boss) that drains webhook + workflow jobs off the request path (Gate B4).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fourty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fourty}
      POSTGRES_DB: fourty
      FOURTY_APP_PASSWORD: ${FOURTY_APP_PASSWORD:-fourty_app}
    volumes:
      - fourty-pg:/var/lib/postgresql/data
      # Creates the fourty_app application role on first init (ADR-001).
      - ./docker/init-fourty-app.sh:/docker-entrypoint-initdb.d/10-fourty-app.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fourty -d fourty"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: apply migrations as the OWNER role, then exit. App waits for it.
  migrate:
    build: .
    command: ["npm", "run", "db:migrate"]
    environment:
      MIGRATE_DATABASE_URL: postgresql://fourty:${POSTGRES_PASSWORD:-fourty}@postgres:5432/fourty
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    environment:
      # App connects as the non-owner role so Postgres RLS applies (ADR-001).
      DATABASE_URL: postgresql://fourty_app:${FOURTY_APP_PASSWORD:-fourty_app}@postgres:5432/fourty
      # pg-boss manages its own `pgboss` schema (DDL) → connect as the owner. It
      # only ever touches that schema; all tenant data still flows through the
      # fourty_app pool under RLS (ADR-004).
      QUEUE_DATABASE_URL: postgresql://fourty:${POSTGRES_PASSWORD:-fourty}@postgres:5432/fourty
      NODE_ENV: production
      PORT: 3000
      # Local demo runs over plain HTTP, so session cookies can't be Secure-only.
      # Behind TLS in production, REMOVE this line so cookies are Secure.
      FOURTY_INSECURE_COOKIE: ${FOURTY_INSECURE_COOKIE:-1}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
    stop_grace_period: 20s

  # Background worker: drains webhook + workflow jobs from pg-boss with retry /
  # backoff / dead-letter (ADR-004). Same image, different entrypoint. Scales
  # horizontally (SELECT … FOR UPDATE SKIP LOCKED) — run more replicas for more
  # throughput.
  worker:
    build: .
    command: ["npm", "run", "worker"]
    environment:
      # Job handlers re-enter withWorkspace() as fourty_app (RLS + audit apply).
      DATABASE_URL: postgresql://fourty_app:${FOURTY_APP_PASSWORD:-fourty_app}@postgres:5432/fourty
      # pg-boss schema (DDL) as the owner, same as the app.
      QUEUE_DATABASE_URL: postgresql://fourty:${POSTGRES_PASSWORD:-fourty}@postgres:5432/fourty
      NODE_ENV: production
      # Set to 1 only if your webhooks target private/loopback services.
      FOURTY_ALLOW_PRIVATE_WEBHOOKS: ${FOURTY_ALLOW_PRIVATE_WEBHOOKS:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    stop_grace_period: 20s

volumes:
  fourty-pg:
