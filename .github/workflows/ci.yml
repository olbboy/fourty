name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fourty
          POSTGRES_PASSWORD: fourty
          POSTGRES_DB: fourty_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fourty"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # App/tests connect as the RLS-subject role; migrations as the owner.
      DATABASE_URL: postgresql://fourty_app:fourty_app@localhost:5432/fourty_test
      MIGRATE_DATABASE_URL: postgresql://fourty:fourty@localhost:5432/fourty_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Provision app role + reversibility DB
        run: |
          PGPASSWORD=fourty psql -h localhost -U fourty -d fourty_test -c "CREATE ROLE fourty_app LOGIN PASSWORD 'fourty_app';"
          PGPASSWORD=fourty psql -h localhost -U fourty -d fourty_test -c "CREATE DATABASE fourty_revtest OWNER fourty;"
      - name: Type check
        run: npx tsc --noEmit
      - name: Migrate test database (as owner)
        run: npm run db:migrate
      - name: Unit + integration + isolation + security tests (real Postgres + RLS)
        run: npm test
      - name: Production build
        run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Fail CI on any HIGH/CRITICAL advisory. Remaining MODERATE transitive
      # advisories (Next → postcss) can't be fixed without a breaking downgrade;
      # tracked, not silenced.
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

  # Playwright smoke suite (auth / kanban / ⌘K) in real Chromium. Non-blocking
  # for now (continue-on-error) — surfaced on the PR but does not gate merge;
  # flip to required once it proves stable.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fourty
          POSTGRES_PASSWORD: fourty
          POSTGRES_DB: fourty_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fourty"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # App connects as the RLS-subject role; migrations (globalSetup) as owner.
      DATABASE_URL: postgresql://fourty_app:fourty_app@localhost:5432/fourty_e2e
      MIGRATE_DATABASE_URL: postgresql://fourty:fourty@localhost:5432/fourty_e2e
      # Allow the session cookie over plain HTTP (next start on localhost).
      FOURTY_INSECURE_COOKIE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Same script developers run locally: ensures the app role + e2e database.
      # Migrations run from Playwright's globalSetup, so no db:migrate step here.
      - name: Provision E2E database + app role
        run: npm run db:e2e:setup
        env:
          PGPASSWORD: fourty
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke suite (non-blocking)
        run: npm run test:e2e
        continue-on-error: true
      - name: Upload Playwright report + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
